kind: Deployment
apiVersion: apps/v1
metadata:
  name: online-shop-deployment
  namespace: canary-ns
  labels: 
    app: online-shop
spec:
  replicas: 4
  selector: 
    matchLabels: 
      app: online-shop
  strategy:
    type: canary
  templates:
    metadata:
      labels:
        app: online-shop
  spec:
    containers:
      - name: online-shop
        image: amitabhdevops/online_shop
        resources:
          request: 
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "200m"
            memory: "512Mi"